<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="bgInner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle inner shadow/depth -->
  <rect x="8" y="8" width="496" height="496" rx="108" fill="url(#bgInner)" opacity="0.3"/>

  <!-- House: roof -->
  <path d="M256 100 L120 220 L150 220 L150 370 L362 370 L362 220 L392 220 Z"
        fill="none" stroke="white" stroke-width="18" stroke-linejoin="round" stroke-linecap="round" opacity="0.95"/>

  <!-- Central hub (automation core) -->
  <circle cx="256" cy="280" r="28" fill="white" opacity="0.95" filter="url(#softGlow)"/>
  <circle cx="256" cy="280" r="18" fill="url(#bg)"/>
  <!-- Power symbol inside hub -->
  <line x1="256" y1="270" x2="256" y2="262" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <path d="M244 272 A16 16 0 1 0 268 272" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Connection lines from hub to devices -->
  <g stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <!-- Up-left to light -->
    <line x1="236" y1="262" x2="200" y2="230"/>
    <!-- Up-right to camera -->
    <line x1="276" y1="262" x2="312" y2="230"/>
    <!-- Left to access -->
    <line x1="228" y1="280" x2="180" y2="280"/>
    <!-- Right to rural -->
    <line x1="284" y1="280" x2="332" y2="280"/>
    <!-- Down-left -->
    <line x1="238" y1="300" x2="204" y2="336"/>
    <!-- Down-right -->
    <line x1="274" y1="300" x2="308" y2="336"/>
  </g>

  <!-- Device nodes (endpoints) -->
  <g filter="url(#glow)">
    <!-- Light (top-left) -->
    <circle cx="192" cy="224" r="12" fill="white" opacity="0.9"/>
    <!-- Camera (top-right) -->
    <circle cx="320" cy="224" r="12" fill="white" opacity="0.9"/>
    <!-- Access (left) -->
    <circle cx="172" cy="280" r="12" fill="white" opacity="0.9"/>
    <!-- Rural (right) -->
    <circle cx="340" cy="280" r="12" fill="white" opacity="0.9"/>
    <!-- Node bottom-left -->
    <circle cx="196" cy="342" r="12" fill="white" opacity="0.9"/>
    <!-- Node bottom-right -->
    <circle cx="316" cy="342" r="12" fill="white" opacity="0.9"/>
  </g>

  <!-- WiFi/signal arcs above roof -->
  <g fill="none" stroke="white" stroke-width="7" stroke-linecap="round" filter="url(#glow)">
    <path d="M236 92 A26 26 0 0 1 276 92" opacity="0.9"/>
    <path d="M222 74 A42 42 0 0 1 290 74" opacity="0.55"/>
    <path d="M210 56 A56 56 0 0 1 302 56" opacity="0.3"/>
  </g>
</svg>