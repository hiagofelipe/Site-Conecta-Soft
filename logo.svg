<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Blue gradient (main arc + circuits + hand) -->
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00b0ff"/>
      <stop offset="50%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="blueLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>

    <!-- Green gradient (right arc) -->
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="50%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>

    <!-- Hand gradient -->
    <linearGradient id="hand" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="40%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>

    <!-- House gradient -->
    <linearGradient id="house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#546e7a"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#90a4ae"/>
      <stop offset="100%" stop-color="#546e7a"/>
    </linearGradient>

    <!-- WiFi gradient -->
    <linearGradient id="wifi" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>

    <!-- Bulb glow -->
    <linearGradient id="bulb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#ffb300"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===============================================
       OUTER BLUE ARC (left/top, thick crescent)
  ================================================ -->
  <path d="M118 440 A230 230 0 0 1 72 72" fill="none" stroke="url(#blue)" stroke-width="32" stroke-linecap="round"/>
  <!-- Inner thinner blue arc for depth -->
  <path d="M128 426 A214 214 0 0 1 86 86" fill="none" stroke="url(#blueLight)" stroke-width="8" stroke-linecap="round" opacity="0.35"/>

  <!-- ===============================================
       OUTER GREEN ARC (right/bottom)
  ================================================ -->
  <path d="M394 72 A230 230 0 0 1 440 440" fill="none" stroke="url(#green)" stroke-width="24" stroke-linecap="round"/>
  <!-- Inner thinner green arc -->
  <path d="M384 88 A214 214 0 0 1 426 426" fill="none" stroke="url(#green)" stroke-width="6" stroke-linecap="round" opacity="0.4"/>

  <!-- ===============================================
       CIRCUIT BOARD TRACES (from left blue arc)
  ================================================ -->
  <g fill="none" stroke="url(#blueLight)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Trace 1: tallest, goes up to near top -->
    <path d="M118 350 L118 180 L118 130"/>
    <circle cx="118" cy="120" r="8" fill="url(#blueLight)" stroke="none"/>

    <!-- Trace 2: medium height, branches from trace 1 -->
    <path d="M118 260 L148 260 L148 160"/>
    <circle cx="148" cy="150" r="8" fill="url(#blueLight)" stroke="none"/>

    <!-- Trace 3: shorter, branches right -->
    <path d="M118 310 L160 310 L160 220"/>
    <circle cx="160" cy="210" r="7" fill="url(#blueLight)" stroke="none"/>

    <!-- Trace 4: short horizontal -->
    <path d="M118 355 L155 355"/>
    <circle cx="162" cy="355" r="6.5" fill="url(#blueLight)" stroke="none"/>
  </g>

  <!-- ===============================================
       HOUSE BODY
  ================================================ -->
  <!-- Walls -->
  <rect x="188" y="230" width="185" height="115" rx="4" fill="url(#house)" stroke="#455a64" stroke-width="2"/>
  <!-- Inner shadow area -->
  <rect x="194" y="236" width="173" height="103" rx="2" fill="#1a2a3a" opacity="0.5"/>

  <!-- ===============================================
       ROOF
  ================================================ -->
  <path d="M172 234 L280 130 L398 234 Z" fill="url(#roof)" stroke="#78909c" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Roof ridge line -->
  <path d="M186 232 L280 142 L384 232" fill="none" stroke="#37474f" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- ===============================================
       CHIMNEY
  ================================================ -->
  <rect x="218" y="152" width="24" height="55" rx="2" fill="#546e7a" stroke="#78909c" stroke-width="1.5"/>
  <!-- Chimney cap -->
  <rect x="214" y="148" width="32" height="6" rx="2" fill="#78909c"/>

  <!-- ===============================================
       WIFI SYMBOL (above chimney)
  ================================================ -->
  <g filter="url(#glow)">
    <circle cx="270" cy="112" r="5" fill="url(#wifi)"/>
    <path d="M250 100 A26 26 0 0 1 290 100" fill="none" stroke="url(#wifi)" stroke-width="6" stroke-linecap="round"/>
    <path d="M238 86 A40 40 0 0 1 302 86" fill="none" stroke="url(#wifi)" stroke-width="5.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M226 72 A54 54 0 0 1 314 72" fill="none" stroke="url(#wifi)" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- ===============================================
       LIGHTBULB (center-left inside house)
  ================================================ -->
  <g transform="translate(242, 290)" filter="url(#glow)">
    <!-- Bulb glass -->
    <path d="M0 -24 C-16 -24, -24 -10, -24 4 C-24 14, -16 22, -12 26 L12 26 C16 22, 24 14, 24 4 C24 -10, 16 -24, 0 -24 Z"
          fill="url(#bulb)" opacity="0.85"/>
    <!-- Bulb screw base -->
    <rect x="-10" y="26" width="20" height="5" rx="2" fill="#bdbdbd"/>
    <rect x="-8" y="31" width="16" height="4" rx="2" fill="#9e9e9e"/>
    <rect x="-6" y="35" width="12" height="3" rx="1.5" fill="#757575"/>
    <!-- Filament -->
    <path d="M-4 8 C-2 -2, 2 -2, 4 8" fill="none" stroke="#fff8e1" stroke-width="2" opacity="0.9"/>
    <!-- Light rays -->
    <g stroke="url(#bulb)" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
      <line x1="-30" y1="0" x2="-38" y2="0"/>
      <line x1="30" y1="0" x2="38" y2="0"/>
      <line x1="0" y1="-32" x2="0" y2="-40"/>
      <line x1="-22" y1="-18" x2="-28" y2="-24"/>
      <line x1="22" y1="-18" x2="28" y2="-24"/>
      <line x1="-22" y1="16" x2="-28" y2="22"/>
      <line x1="22" y1="16" x2="28" y2="22"/>
    </g>
  </g>

  <!-- ===============================================
       SECURITY CAMERA (upper-right inside house)
  ================================================ -->
  <g transform="translate(340, 266)">
    <!-- Mounting arm -->
    <path d="M18 -18 L18 -8 L8 -2" fill="none" stroke="#90a4ae" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Camera body -->
    <rect x="-14" y="-12" width="28" height="20" rx="4" fill="#607d8b" stroke="#78909c" stroke-width="1.5"/>
    <!-- Lens hood -->
    <path d="M-16 -10 L-26 -6 L-26 6 L-16 10" fill="#455a64" stroke="#546e7a" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Lens outer -->
    <circle cx="-21" cy="0" r="7" fill="#263238" stroke="#37474f" stroke-width="1.5"/>
    <!-- Lens middle -->
    <circle cx="-21" cy="0" r="4" fill="#0d47a1" opacity="0.7"/>
    <!-- Lens inner (highlight) -->
    <circle cx="-21" cy="0" r="2" fill="#29b6f6" opacity="0.9"/>
    <!-- LED -->
    <circle cx="8" cy="-6" r="2" fill="#ef5350" opacity="0.85"/>
  </g>

  <!-- ===============================================
       GATE / ACCESS CONTROL (right side)
  ================================================ -->
  <g transform="translate(388, 296)">
    <!-- Gate frame -->
    <rect x="-18" y="-28" width="36" height="50" rx="2" fill="none" stroke="#78909c" stroke-width="3"/>
    <!-- Top crossbar -->
    <line x1="-18" y1="-14" x2="18" y2="-14" stroke="#78909c" stroke-width="2.5"/>
    <!-- Vertical bars -->
    <line x1="-10" y1="-28" x2="-10" y2="22" stroke="#78909c" stroke-width="2.5"/>
    <line x1="-2" y1="-28" x2="-2" y2="22" stroke="#78909c" stroke-width="2.5"/>
    <line x1="6" y1="-28" x2="6" y2="22" stroke="#78909c" stroke-width="2.5"/>
    <!-- Spear points on top -->
    <g fill="#90a4ae">
      <polygon points="-13,-28 -10,-36 -7,-28"/>
      <polygon points="-5,-28 -2,-38 1,-28"/>
      <polygon points="3,-28 6,-38 9,-28"/>
      <polygon points="11,-28 14,-36 17,-28"/>
    </g>
  </g>

  <!-- ===============================================
       HAND (blue, palm up, presenting)
  ================================================ -->
  <g opacity="0.92">
    <!-- Main hand shape -->
    <path d="
      M130 410
      C142 390, 158 370, 182 355
      C198 345, 215 338, 230 332
      L248 326
      C254 324, 262 323, 270 324
      L360 328
      C366 328, 372 326, 374 322
      C378 316, 374 310, 366 308
      L310 304
      C305 304, 300 300, 302 296
      C304 292, 310 290, 316 292
      L378 298
      C388 300, 396 308, 396 318
      C396 332, 384 342, 372 346
      L362 350
      C362 350, 366 362, 362 370
      C358 378, 348 380, 340 378
      L260 372
      C244 370, 226 365, 212 358
      L184 378
      C170 388, 156 400, 146 412
      C140 418, 128 418, 124 410
      C120 404, 128 396, 130 410 Z
    " fill="url(#hand)"/>
    <!-- Finger detail lines -->
    <path d="M360 328 C364 322, 362 314, 356 312" fill="none" stroke="#0d47a1" stroke-width="1.5" opacity="0.3"/>
    <path d="M352 346 L356 360" fill="none" stroke="#0d47a1" stroke-width="1" opacity="0.25"/>
    <!-- Palm highlight -->
    <path d="M200 350 C220 342, 248 334, 270 332" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.2"/>
  </g>

</svg>